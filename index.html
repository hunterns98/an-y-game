<!DOCTYPE html>
<html>

<head>

<title>Ăn Ý ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>
Ăn Ý ❤️
</h1>
<button onclick="showHost()">

🎮 Tôi là Host

</button>


<button onclick="showPlayer()">

👥 Tôi là người chơi

</button>
<div id="host" style="display:none;">


<h2>
Host
</h2>


<input id="hostName"
placeholder="Tên host">


<button onclick="createRoom()">
Tạo phòng
</button>


<h3 id="roomCode"></h3>
<div id="playerList">

Chưa có người chơi

</div>
<div id="teamList">
<div id="gameArea">

Chưa bắt đầu

</div>
Chưa ghép cặp

</div>

<button onclick="makeTeams()">

Ghép cặp

</button>
<button onclick="startGame()">

🎮 Bắt đầu chơi

</button>
</div>
<div id="home">

<div id="player" style="display:none;">
<input id="name"
placeholder="Tên của bạn">


<input id="room"
placeholder="Mã phòng">


<button onclick="joinRoom()">
Vào phòng
</button>
</div>

</div>



<div id="game" style="display:none">


<h2 id="question">

Đang chờ host...

</h2>


<div id="answers"></div>


</div>


</div>



<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-database-compat.js"></script>


<script src="firebase.js"></script>

<script src="app.js"></script>


</body>


</html>
