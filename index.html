<!DOCTYPE html>
<html>
<head>
<title>Ăn Ý ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <h1>Ăn Ý ❤️</h1>

  <!-- CHỌN ROLE -->
  <div id="roleSelect">
    <button onclick="showHost()">🎮 Tôi là Host</button>
    <button onclick="showPlayer()">👥 Tôi là người chơi</button>
  </div>

  <!-- ==================== HOST PANEL ==================== -->
  <div id="host" style="display:none;">
    <h2>Host</h2>
    <input id="hostName" placeholder="Tên host">
    <button onclick="createRoom()">Tạo phòng</button>

    <h3 id="roomCode"></h3>

    <div id="playerList">Chưa có người chơi</div>

    <button onclick="makeTeams()">💞 Ghép cặp</button>

    <div id="teamList">Chưa ghép cặp</div>

    <button onclick="startGame()" id="btnStart" style="display:none;">
      🎮 Bắt đầu chơi
    </button>

    <!-- Câu hỏi hiện tại host thấy -->
    <div id="hostGameArea" style="display:none;">
      <hr>
      <h3 id="hostQuestion"></h3>
      <p id="hostOptions"></p>
      <p><strong>Câu:</strong> <span id="hostRound"></span> / 20</p>
      <button onclick="nextQuestion()">➡️ Câu tiếp theo</button>
      <button onclick="revealAnswers()">🔓 Reveal đáp án</button>
      <div id="hostAnswerList"></div>
    </div>
  </div>

  <!-- ==================== PLAYER PANEL ==================== -->
  <div id="player" style="display:none;">
    <input id="name" placeholder="Tên của bạn">
    <input id="room" placeholder="Mã phòng">
    <button onclick="joinRoom()">Vào phòng</button>
  </div>

  <!-- ==================== GAME AREA (PLAYER) ==================== -->
  <div id="game" style="display:none;">
    <h3 id="playerRound"></h3>
    <h2 id="question">Đang chờ host...</h2>

    <!-- Nút chọn A/B -->
    <div id="answers"></div>

    <!-- Sau khi chọn -->
    <div id="playerStatus" style="display:none;"></div>

    <!-- Kết quả reveal -->
    <div id="resultArea" style="display:none;"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>
<script src="app.js"></script>
</body>
</html>
